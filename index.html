<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="main-container">
      <header class="input-container">
        <input type="text" class="city-input" placeholder="Search City..." />
        <button class="search-btn">
          <i class="fa-solid fa-magnifying-glass"></i>
        </button>
      </header>

      <section class="weather-info" style="display: none">
        <div class="location-date-container">
          <div class="location">
            <i class="fa-solid fa-location-crosshairs"></i>
            <h4 class="country-txt">VietNam</h4>
          </div>
          <h5 class="current-date-txt regular-txt">Wed, 18 March</h5>
        </div>

        <div class="weather-summary-container">
          <img
            src="./assets/weather/clouds.svg"
            alt=""
            class="weather-summary-img"
          />
          <div class="weather-summary-info">
            <h1 class="temp-txt">29 °C</h1>
            <h3 class="condition-txt regular-txt">Clouds</h3>
          </div>
        </div>

        <div class="weather-conditions-container">
          <div class="condition-info">
            <span class="material-symbols-outlined"> water_drop </span>
            <div class="condition-item">
              <h5 class="regular-txt">Humidity</h5>
              <h5 class="humidity-value-txt">55%</h5>
            </div>
          </div>

          <div class="condition-info">
            <span class="material-symbols-outlined"> air </span>
            <div class="condition-item">
              <h5 class="regular-txt">Wind speed</h5>
              <h5 class="humidity-value-txt">2 M/s</h5>
            </div>
          </div>
        </div>

        <div class="forecast-items-container">
          <div class="forecast-item">
            <h5 class="forecast-item-date regular-txt">18 March</h5>
            <img
              src="./assets/weather/thunderstorm.svg"
              alt=""
              class="forecast-item-img"
            />
            <h5 class="forecast-item-temp">29 °C</h5>
          </div>
          <div class="forecast-item">
            <h5 class="forecast-item-date regular-txt">18 March</h5>
            <img
              src="./assets/weather/thunderstorm.svg"
              alt=""
              class="forecast-item-img"
            />
            <h5 class="forecast-item-temp">29 °C</h5>
          </div>
          <div class="forecast-item">
            <h5 class="forecast-item-date regular-txt">18 March</h5>
            <img
              src="./assets/weather/thunderstorm.svg"
              alt=""
              class="forecast-item-img"
            />
            <h5 class="forecast-item-temp">29 °C</h5>
          </div>
          <div class="forecast-item">
            <h5 class="forecast-item-date regular-txt">18 March</h5>
            <img
              src="./assets/weather/thunderstorm.svg"
              alt=""
              class="forecast-item-img"
            />
            <h5 class="forecast-item-temp">29 °C</h5>
          </div>
          <div class="forecast-item">
            <h5 class="forecast-item-date regular-txt">18 March</h5>
            <img
              src="./assets/weather/thunderstorm.svg"
              alt=""
              class="forecast-item-img"
            />
            <h5 class="forecast-item-temp">29 °C</h5>
          </div>
        </div>
      </section>

      <!-- <section class="search-city section-message">
        <img src="./assets/message/search.png" alt="" class="message-img" />
        <div>
          <h1>Search City</h1>
          <h4 class="regular-txt">
            Find out the weather conditions of the city
          </h4>
        </div>
      </section> -->

      <section class="not-found section-message">
        <img src="./assets/message/notfound.png" alt="" class="message-img" />
        <div>
          <h1>Not Found</h1>
          <h4 class="regular-txt">
            Find out the weather conditions of the city
          </h4>
        </div>
      </section>
    </main>

    <script src="./main.js" defer></script>
  </body>
</html>
