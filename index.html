<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="main-container">
      <header class="input-container">
        <input type="text" class="city-input" placeholder="Search City..." />
        <button class="search-btn">
          <i class="fa-solid fa-magnifying-glass"></i>
        </button>
      </header>

      <section class="weather-info">
        <div class="location-date-container">
          <div class="location">
            <i class="fa-solid fa-location-crosshairs"></i>
            <h4 class="country-txt">VietNam</h4>
          </div>
          <h5 class="current-date-txt regular-txt">Wed, 18 March</h5>
        </div>

        <div class="weather-summary-container">
          <img
            src="./assets/weather/clouds.svg"
            alt=""
            class="weather-summary-img"
          />
          <div class="weather-summary-info">
            <h1 class="temp-txt">29 °C</h1>
            <h3 class="condition-txt regular-txt">Clouds</h3>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
